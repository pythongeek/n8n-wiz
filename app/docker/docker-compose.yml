version: '3.8'

services:
  # n8n Core - Local automation orchestrator
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.50.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${TUNNEL_URL:-https://n8n.yourdomain.com}
      - N8N_METRICS=true
      - N8N_LOG_LEVEL=info
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # AI API connectivity
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1,postgres,redis
      # CORS for Vercel
      - N8N_CORS_ORIGIN=${N8N_CORS_ORIGIN:-https://*.vercel.app}
      - N8N_CORS_CREDENTIALS=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./backup:/backup
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - n8n-network

  # PostgreSQL for n8n persistence
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network

  # Redis for queue mode (optional, for high-volume)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network
    profiles:
      - queue

  # Option 1: MCP Server Bridge
  mcp-bridge:
    build:
      context: ./mcp-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - N8N_API_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - MCP_API_KEY=${MCP_API_KEY}
      - PORT=3001
      - LOG_LEVEL=info
    depends_on:
      n8n:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - n8n-network

  # Option 2: Browser Automation (Playwright)
  browser-automation:
    image: mcr.microsoft.com/playwright:v1.40.0-jammy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - DISPLAY=:99
      - PLAYWRIGHT_WS_ENDPOINT=0.0.0.0:3002
      - BROWSER_SECRET=${BROWSER_SECRET}
      - N8N_URL=${TUNNEL_URL:-https://n8n.yourdomain.com}
    volumes:
      - ./browser-scripts:/app/scripts:ro
    command: >
      bash -c "
        npm install -g playwright-core @playwright/test &&
        xvfb-run -a node /app/scripts/browser-server.js
      "
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - n8n-network
    profiles:
      - browser

  # Cloudflare Tunnel - Secure public access
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - n8n-network

  # Backup service - Automated workflow exports
  backup:
    image: docker.n8n.io/n8nio/n8n:1.50.0
    restart: unless-stopped
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n:ro
      - ./backups:/backups
    command: >
      bash -c "
        while true; do
          sleep 86400 &&
          echo 'Starting backup...' &&
          n8n export:workflow --all --output=/backups/workflows-\$(date +%Y%m%d-%H%M%S).json &&
          n8n export:credential --all --output=/backups/credentials-\$(date +%Y%m%d-%H%M%S).json &&
          find /backups -name '*.json' -mtime +7 -delete &&
          echo 'Backup completed'
        done
      "
    profiles:
      - backup
    networks:
      - n8n-network

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  n8n-network:
    driver: bridge
